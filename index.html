<section id="hero">
    <!-- existing content -->
</section>

    <div role="region" aria-live="polite" aria-atomic="false" class="tts-player">
        <button id="play-btn" aria-pressed="false" aria-label="Play">▶️</button>
        <button id="pause-btn" aria-pressed="false" aria-label="Pause">⏸️</button>
        <button id="stop-btn" aria-pressed="false" aria-label="Stop">⏹️</button>
        <div id="tts-status" hidden></div>
    </div>

    <div class="divider"></div>

<script>
    const playBtn = document.getElementById('play-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const stopBtn = document.getElementById('stop-btn');
    const status = document.getElementById('tts-status');
    const speech = new SpeechSynthesis();

    function readText() {
        const text = document.body.innerText.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
        speech.speak(new SpeechSynthesisUtterance(text));
        status.textContent = 'Playing';
    }

    playBtn.addEventListener('click', function() {
        if (!speech.speaking) {
            readText();
            playBtn.setAttribute('aria-pressed', 'true');
            pauseBtn.setAttribute('aria-pressed', 'false');
            stopBtn.setAttribute('aria-pressed', 'false');
        }
    });

    pauseBtn.addEventListener('click', function() {
        if (speech.speaking) {
            speech.pause();
            pauseBtn.setAttribute('aria-pressed', 'true');
            playBtn.setAttribute('aria-pressed', 'false');
            stopBtn.setAttribute('aria-pressed', 'false');
            status.textContent = 'Paused';
        }
    });

    stopBtn.addEventListener('click', function() {
        if (speech.speaking || speech.paused) {
            speech.cancel();
            playBtn.setAttribute('aria-pressed', 'false');
            pauseBtn.setAttribute('aria-pressed', 'false');
            stopBtn.setAttribute('aria-pressed', 'false');
            status.textContent = 'Stopped';
        }
    });
</script>
<style>
    .tts-player {
        /* Your existing player styles here */
    }
</style>
